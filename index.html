<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>椿萱守望 - 老人端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        .header p { font-size: 18px; opacity: 0.9; }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .status {
            text-align: center;
            margin-bottom: 20px;
        }
        .status-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        .status-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .status-time {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }
        
        .btn {
            width: 100%;
            height: 80px;
            border: none;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:active { transform: scale(0.98); }
        
        .btn-checkin { background: #2ecc71; }
        .btn-checkin:hover { background: #27ae60; }
        .btn-checkin.disabled { background: #95a5a6; cursor: not-allowed; }
        
        .btn-call { background: #3498db; }
        .btn-call:hover { background: #2980b9; }
        
        .btn-sos { 
            background: #e74c3c; 
            animation: pulse 2s infinite;
        }
        .btn-sos:hover { background: #c0392b; }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            50% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
        }
        
        .tip {
            color: white;
            font-size: 14px;
            text-align: center;
            opacity: 0.8;
        }

        /* 视频通话弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 90%;
        }
        .video-container {
            width: 300px;
            height: 400px;
            background: #333;
            border-radius: 10px;
            margin: 20px auto;
            position: relative;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
        }
        .call-status {
            color: #666;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>👴 椿萱守望</h1>
        <p id="dateDisplay">让爱零距离</p>
    </div>

    <div class="card">
        <div class="status">
            <div class="status-icon" id="statusIcon">⏰</div>
            <div class="status-text" id="statusText">今天还没打卡</div>
            <div class="status-time" id="statusTime">--</div>
        </div>
        
        <button class="btn btn-checkin" id="checkInBtn" onclick="checkIn()">
            ✅ 我很好，平安打卡
        </button>
        
        <button class="btn btn-call" onclick="startVideoCall()">
            📹 和子女视频通话
        </button>
        
        <button class="btn btn-sos" 
                onmousedown="startSos()" 
                onmouseup="cancelSos()" 
                ontouchstart="startSos()" 
                ontouchend="cancelSos()">
            🚨 按住3秒：紧急呼救
        </button>
    </div>

    <p class="tip">长按红色按钮3秒触发紧急呼救</p>

    <!-- 视频通话弹窗 -->
    <div class="modal" id="callModal">
        <div class="modal-content">
            <h2>📹 视频通话</h2>
            <div class="video-container">
                <video id="localVideo" autoplay muted playsinline></video>
            </div>
            <p class="call-status" id="callStatus">正在连接...</p>
            <button class="btn btn-call" onclick="endCall()">挂断</button>
        </div>
    </div>

    <script>
        // Gist 配置（已验证可用）
        const GIST_ID = 'cf06b6148ec1b8ba7db6cc142c1e96ed';
        const GIST_URL = `https://api.github.com/gists/${GIST_ID}`;

        // 显示日期
        function updateDate() {
            const d = new Date();
            document.getElementById('dateDisplay').textContent = 
                `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
        }
        updateDate();

        // 检查今日是否已打卡
        async function checkTodayStatus() {
            try {
                const res = await fetch(GIST_URL);
                const gist = await res.json();
                const content = JSON.parse(gist.files['silver-care-data.json'].content);
                const data = content.elder_001;
                
                if (data && data.lastCheckIn) {
                    const checkDate = new Date(data.lastCheckIn).toDateString();
                    const today = new Date().toDateString();
                    
                    if (checkDate === today) {
                        document.getElementById('statusIcon').textContent = '✅';
                        document.getElementById('statusText').textContent = '今日已打卡';
                        document.getElementById('statusText').style.color = '#2ecc71';
                        document.getElementById('statusTime').textContent = data.timeString || '';
                        
                        const btn = document.getElementById('checkInBtn');
                        btn.textContent = '✓ 今日已打卡';
                        btn.classList.add('disabled');
                        btn.disabled = true;
                    }
                }
            } catch(e) {
                console.log('加载状态失败', e);
            }
        }

        // 打卡
        async function checkIn() {
            const btn = document.getElementById('checkInBtn');
            btn.disabled = true;
            
            const now = new Date();
            const newData = {
                elder_001: {
                    name: "张建国",
                    status: "checked_in",
                    lastCheckIn: now.toISOString(),
                    timeString: now.toLocaleString('zh-CN'),
                    mood: "开心",
                    sos: false
                }
            };
            
            try {
                // 获取当前 Gist 信息
                const getRes = await fetch(GIST_URL);
                const gist = await getRes.json();
                
                // 更新 Gist
                const updateRes = await fetch(GIST_URL, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        files: {
                            'silver-care-data.json': {
                                content: JSON.stringify(newData, null, 2)
                            }
                        }
                    })
                });
                
                if (updateRes.ok) {
                    document.getElementById('statusIcon').textContent = '✅';
                    document.getElementById('statusText').textContent = '打卡成功！';
                    document.getElementById('statusText').style.color = '#2ecc71';
                    document.getElementById('statusTime').textContent = newData.elder_001.timeString;
                    
                    btn.textContent = '✓ 今日已打卡';
                    btn.classList.add('disabled');
                    
                    // 请求通知权限
                    requestNotification();
                    
                    alert('打卡成功！子女会收到通知');
                } else {
                    throw new Error('更新失败');
                }
            } catch (err) {
                alert('打卡失败：' + err.message);
                btn.disabled = false;
            }
        }

        // 请求浏览器通知权限
        function requestNotification() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        new Notification('椿萱守望', {
                            body: '爸爸已平安打卡！',
                            icon: '👴'
                        });
                    }
                });
            }
        }

        // WebRTC 视频通话
        let localStream = null;
        
        async function startVideoCall() {
            const modal = document.getElementById('callModal');
            const status = document.getElementById('callStatus');
            
            modal.classList.add('active');
            status.textContent = '正在获取摄像头...';
            
            try {
                // 获取本地摄像头
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });
                
                const video = document.getElementById('localVideo');
                video.srcObject = localStream;
                
                status.textContent = '摄像头已开启，等待子女接听...';
                
                // 实际应用中这里会建立 WebRTC 连接
                // 简化版：仅演示本地视频
                
            } catch (err) {
                status.textContent = '无法访问摄像头：' + err.message;
                console.error('摄像头错误', err);
            }
        }
        
        function endCall() {
            const modal = document.getElementById('callModal');
            modal.classList.remove('active');
            
            // 停止摄像头
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
        }

        // SOS
        let sosTimer;
        async function startSos() {
            const btn = document.querySelector('.btn-sos');
            btn.textContent = '⏳ 按住3秒...';
            
            sosTimer = setTimeout(async () => {
                try {
                    const getRes = await fetch(GIST_URL);
                    const gist = await getRes.json();
                    
                    const now = new Date();
                    const newData = {
                        elder_001: {
                            name: "张建国",
                            status: "emergency",
                            lastCheckIn: now.toISOString(),
                            timeString: now.toLocaleString('zh-CN'),
                            mood: "紧急",
                            sos: true,
                            sosTime: now.toISOString()
                        }
                    };
                    
                    await fetch(GIST_URL, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({
                            files: {
                                'silver-care-data.json': {
                                    content: JSON.stringify(newData, null, 2)
                                }
                            }
                        })
                    });
                    
                    alert('🚨 紧急呼救已发送！\n\n子女将收到：\n1. 浏览器通知\n2. 页面弹窗提醒\n3. 紧急状态标记');
                    
                } catch (err) {
                    alert('发送失败：' + err.message);
                }
            }, 3000);
        }
        
        function cancelSos() {
            clearTimeout(sosTimer);
            document.querySelector('.btn-sos').textContent = '🚨 按住3秒：紧急呼救';
        }

        // 页面加载时检查状态
        checkTodayStatus();
    </script>

</body>
</html>
